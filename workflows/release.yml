# Reusable Release Workflow
# Usage: uses: <org>/.github/workflows/release.yml@main

name: Release

on:
  workflow_call:
    inputs:
      release-type:
        description: 'Release type (major, minor, patch)'
        required: false
        type: string
        default: 'patch'
      create-github-release:
        description: 'Create GitHub release'
        required: false
        type: boolean
        default: true
      generate-changelog:
        description: 'Generate changelog'
        required: false
        type: boolean
        default: true
    secrets:
      RELEASE_TOKEN:
        description: 'GitHub token for release'
        required: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Get version info
        id: version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          # Parse version
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # Calculate new version
          case "${{ inputs.release-type }}" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              ;;
          esac

          echo "new_version=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: v$NEW_VERSION"

      - name: Generate changelog
        id: changelog
        if: inputs.generate-changelog
        run: |
          echo "## What's Changed" > CHANGELOG_ENTRY.md
          echo "" >> CHANGELOG_ENTRY.md

          # Get commits since last tag
          if [ "${{ steps.version.outputs.latest_tag }}" != "v0.0.0" ]; then
            git log ${{ steps.version.outputs.latest_tag }}..HEAD --pretty=format:"* %s (%h)" >> CHANGELOG_ENTRY.md
          else
            git log --pretty=format:"* %s (%h)" >> CHANGELOG_ENTRY.md
          fi

          echo "" >> CHANGELOG_ENTRY.md
          echo "" >> CHANGELOG_ENTRY.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.version.outputs.latest_tag }}...${{ steps.version.outputs.new_version }}" >> CHANGELOG_ENTRY.md

      - name: Create GitHub Release
        if: inputs.create-github-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: Release ${{ steps.version.outputs.new_version }}
          body_path: CHANGELOG_ENTRY.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
